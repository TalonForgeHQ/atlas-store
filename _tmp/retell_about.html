document.addEventListener("DOMContentLoaded", function () {
  // Map your attribute values to Meta standard events
  const metaEventMap = {
    try_it_free_click: "CompleteRegistration",
    contact_sale_click: "Lead",
    get_call_click: "Lead",
    sales_form_submission: "Lead"
    // login_click intentionally excluded from standard conversions
  };

  // Track CLICK conversions (buttons/links)
  document.body.addEventListener("click", function (e) {
    const el = e.target.closest("[data-meta-conversion]");
    if (!el) return;

    const conversionType = el.getAttribute("data-meta-conversion");
    if (!conversionType || typeof fbq !== "function") return;

    // Ignore form submission here (handled in submit listener)
    if (conversionType === "sales_form_submission") return;

    const metaEvent = metaEventMap[conversionType];

    // Fire standard event WITH parameter so you can break down by conversion_type
    if (metaEvent) {
      fbq("track", metaEvent, {
        conversion_type: conversionType,
        page_url: location.href
      });
    }

    // Optional (recommended): also fire a custom event for diagnostics
    fbq("trackCustom", "MetaConversionClick", {
      conversion_type: conversionType,
      page_url: location.href
    });
  });

  // Track FORM SUBMISSION conversions (sales form)
  document.body.addEventListener("submit", function (e) {
    const form = e.target.closest("[data-meta-conversion]");
    if (!form) return;

    const conversionType = form.getAttribute("data-meta-conversion");
    if (conversionType !== "sales_form_submission") return;

    if (typeof fbq !== "function") return;

    // Prevent double-firing on the same submit
    if (form.dataset.metaTracked === "true") return;
    form.dataset.metaTracked = "true";

    // Fire standard Lead WITH parameter
    fbq("track", "Lead", {
      conversion_type: conversionType,
      page_url: location.href
    });

    // Optional diagnostics
    fbq("trackCustom", "MetaConversionClick", {
      conversion_type: conversionType,
      page_url: location.href
    });
  });
});
</script>

<script>
document.addEventListener('DOMContentLoaded', function () {
  document.body.addEventListener('click', function (event) {

    function findClickable(element) {
      if (!element || element === document.body) return null;

      if (
        element.matches(
          'button, a, [role="button"], input[type="button"], input[type="submit"]'
        )
      ) {
        return element;
      }

      return findClickable(element.parentElement);
    }

    function getText(el) {
      if (!el) return '';

      // Priority: visible text
      let text = (el.innerText || el.textContent || '').trim();
      if (text) return text;

      // Fallbacks
      return (
        el.getAttribute('aria-label') ||
        el.getAttribute('title') ||
        el.value ||
        el.getAttribute('data-tracker') ||
        'unknown'
      ).trim();
    }

    const el = findClickable(event.target);
    if (!el) return;

    const buttonText = getText(el);
    const trackerValue = el.getAttribute('data-tracker') || null;

    // 🔥 NEW: collect form inputs if button is "Submit"
    let demoFormInputs = {};

    if (buttonText.toLowerCase() === "submit") {
      const fields = document.querySelectorAll(".demo_form_input");

      fields.forEach((field, index) => {
        const key =
          field.name ||
          field.id ||
          field.getAttribute("data-name") ||
          field.placeholder ||
          `demo_form_input_${index + 1}`;

        if (field.type === "checkbox") {
          demoFormInputs[key] = field.checked;
        } else if (field.type === "radio") {
          if (field.checked) demoFormInputs[key] = field.value;
        } else {
          demoFormInputs[key] = field.value;
        }
      });
    }

    // 🚀 Your existing tracking + injected form data
    mixpanel.track('Home Page Click V2 [Client Event] ' + buttonText, {
      buttonText: buttonText,
      trackerValue: trackerValue,
      tagName: el.tagName,
      id: el.id || null,
      classes: el.className || null,
      url: window.location.pathname,

      // 👇 add form data only when Submit
      ...demoFormInputs
    });

    mixpanel.track('Any Click [Client Event]', {
      buttonText: buttonText,
      trackerValue: trackerValue, // null if not present
      tagName: el.tagName,
      id: el.id || null,
      classes: el.className || null,
      url: window.location.pathname
    });
  });
});
</script>

<script>
(function() {
  function getUTMParams() {
    const params = new URLSearchParams(window.location.search);
    return {
      utm_source: params.get("utm_source"),
      utm_medium: params.get("utm_medium"),
      utm_campaign: params.get("utm_campaign"),
      utm_term: params.get("utm_term"),
      utm_content: params.get("utm_content")
    };
  }

  const utms = getUTMParams();

  // Fallback: treat Google referrer as organic if no UTMs
  if (!utms.utm_source && document.referrer.includes("google.")) {
    utms.utm_source = "google";
    utms.utm_medium = "organic";
  }

  console.log("utm", utms);
  console.log("referrer", document.referrer);

  try {
    // Store UTMs in cookies for later use
    const utmParams = ['utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content'];
    utmParams.forEach(param => {
      const value = utms[param];
      if (value) setCookie(param, value, 7); // Keep for 7 days
    });

    if (document.referrer && !document.referrer.includes(location.hostname)) {
      setCookie('referrer', document.referrer, 7);
    }
    
    // Append UTMs + referrer to links
    document.querySelectorAll('a.c-button').forEach(link => {
      const url = new URL(link.href);
      const params = new URLSearchParams(url.search);

      // Add all UTM values
      for (const [k, v] of Object.entries(utms)) {
        if (v) params.set(k, v);
      }

      // Add referrer (encoded so ?/& don't break URL)
      if (document.referrer && !document.referrer.includes(location.hostname)) {
        params.set('referrer', encodeURIComponent(document.referrer));
      }
      url.search = params.toString();
      link.href = url.toString();
    });
  } catch (err) {
    console.warn('UTM tracking failed:', err);
  }

  // Save to localStorage for later analytics
  localStorage.setItem("lead_source", utms.utm_source || "direct");
  localStorage.setItem("lead_medium", utms.utm_medium || "none");

  // Helper functions
  function setCookie(name, value, days) {
    const expires = new Date(Date.now() + days * 864e5).toUTCString();
    document.cookie = `${name}=${encodeURIComponent(value)}; expires=${expires}; path=/`;
  }
})();
</script>

<!-- Mixpanel: website form submission tracking (delegated — catches late-rendered forms) -->
<script>
document.addEventListener('DOMContentLoaded', function () {
  function getCookie(name) {
    var m = document.cookie.match('(?:^|; )' + name + '=([^;]*)');
    return m ? decodeURIComponent(m[1]) : null;
  }

  new MutationObserver(function (mutations) {
    mutations.forEach(function (mut) {
      var el = mut.target;
      if (!(el instanceof HTMLElement)) return;
      if (!el.classList.contains('w-form-done')) return;
      if (el.style.display !== 'block' || el.dataset.mpTracked) return;
      el.dataset.mpTracked = 'true';

      var wrapper = el.closest('.w-form');
      var form = wrapper && wrapper.querySelector('form');
      mixpanel.track('Website Form Submitted', {
        form_name: (form && (form.getAttribute('data-name') || form.id)) || 'unnamed',
        page_path: window.location.pathname,
        page_title: document.title,
        utm_source: getCookie('utm_source') || localStorage.getItem('lead_source') || null,
        utm_medium: getCookie('utm_medium') || localStorage.getItem('lead_medium') || null,
        utm_campaign: getCookie('utm_campaign') || null,
        referrer: getCookie('referrer') || null
      });
    });
  }).observe(document.body, { attributes: true, subtree: true, attributeFilter: ['style'] });
});
</script></body></html>
