your-choices">Your Choices</a></li><li class="content__list-item"><a href="#supplemental-notice-eea-uk-ch">Supplemental Notice for the EEA, UK, and Switzerland</a></li><li class="content__list-item"><a href="#supplemental-notice-us">Supplemental Notice for the United States</a></li><li class="content__list-item"><a href="#policy-changes">Changes to this Privacy Policy</a></li><li class="content__list-item"><a href="#contact-us">Contact Us</a></li></ol></div><div class="Box-dqx32e-0 mtjPu"><h3 id="information-we-collect" class="Title__CardTitle-sc-1kaq8ew-6 eDIPdU">1. Personal Information We Collect</h3><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">We process information about you while providing the WhyLabs Products. Below, we outline the kinds of information we collect.</p><p class="Text__Paragraph-sc-10mwqho-0 Text__ParagraphMedium-sc-10mwqho-4 dzULzd"><strong>Information You Give to Us</strong></p><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">We collect information about you when you provide it to us directly:</p><ul class="text__list"><li class="text__list-item"><strong>Your WhyLabs account.</strong> We collect information about you when you submit it through the WhyLabs Products, including when you create an account with us. This may include your name, email address, profile picture, company name, postal address, and phone number. This may also include your payment information when you purchase any of the WhyLabs Products.</li><li class="text__list-item"><strong>Support.</strong> We collect information you provide to us when you open a support request or otherwise communicate with us (such as through third-party social-media sites). This may include your name, email address, title, company, and any other information you provide in your request.</li><li class="text__list-item"><strong>Other information submitted by you.</strong> We collect information about you that you submit to us through the WhyLabs Products, such as when you participate in any interactive features of the WhyLabs Products or fill out a form on one of our websites. This information may include your name, email address, and mailing address.</li></ul><p class="Text__Paragraph-sc-10mwqho-0 Text__ParagraphMedium-sc-10mwqho-4 gRIvAp"><strong>Information We Collect Automatically</strong></p><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">We automatically collect information about you when you access or use the WhyLabs Products:</p><ul class="text__list"><li class="text__list-item"><strong>Your use of the WhyLabs Products.</strong> We collect information about how you use the WhyLabs Products, such as your session date, time, and duration; the pages you viewed; and the page you visited before navigating to the products or websites.</li><li class="text__list-item"><strong>Device information.</strong> We collect information about your computer or device when you access any of the WhyLabs Products, such as the type of browser you use, your IP address, and the location of your device.</li><li class="text__list-item"><strong>Cookies and similar technologies.</strong> We use cookies and similar technologies (like web beacons and pixels) to collect information about your interactions with the WhyLabs Products, including identifiers, usage data, session information, links clicked, pages visited, and mouse movements. For more information about how we use cookies and similar technologies, please see our<!-- --> <a href="/web/20241212162225/https://whylabs.ai/cookie-policy" title="WhyLabs Cookie Policy">Cookie Policy.</a></li></ul><p class="Text__Paragraph-sc-10mwqho-0 Text__ParagraphMedium-sc-10mwqho-4 gRIvAp"><strong>Information We Collect from Other Sources</strong></p><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">We may also obtain information about you from other sources:</p><ul class="text__list"><li class="text__list-item"><strong>Other services linked to your account.</strong> We may collect information about you when you link your WhyLabs account with other services. For example, if you create or log into your WhyLabs account using your Google Apps credentials via single sign-on, we will have access to certain information such as your name and email address, as authorized in your Google Apps profile settings.</li><li class="text__list-item"><strong>Our affiliates.</strong> We may receive information about you from one of our affiliates if you interact with them directly, for example through a support request. This may include your name, email address, and information about your request.</li><li class="text__list-item"><strong>Third parties.</strong> We may receive information about you from third parties that provide business information to us or from public sources. This information may include things like your name, title, email address, phone number, and social-media profile. We may combine this information with information we collect through other means described above.</li></ul><h3 id="how-we-use-information" class="Title__CardTitle-sc-1kaq8ew-6 eDIPdU">2. How We Use Personal Information</h3><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">We use information about you for the following purposes:</p><ul class="text__list"><li class="text__list-item"><strong>To provide and support your use of the WhyLabs Products.</strong> We use information about you to provide you with access to the WhyLabs Products, including to create and manage your WhyLabs accounts, process transactions with you, and send you invoices, as well as to provide you with customer support.</li><li class="text__list-item"><strong>For research and to improve the WhyLabs Products.</strong> We use information about you, including information about your use of WhyLabs Products, to improve the WhyLabs Products, including to monitor and analyze trends, usage, and other activities in connection with the WhyLabs Products so that we can continually improve them. We may also link or combine information about you with information we get from others to help understand your needs and provide you with better service.</li><li class="text__list-item"><strong>To communicate with you.</strong> We use information about you to communicate with you, including to send you technical notices, product updates, security alerts, support communications, and administrative messages about the WhyLabs Products (including important changes to the WhyLabs Products). This also includes sending you information about your account and data, such as when we update our terms or when we materially change how we use your data.</li><li class="text__list-item"><strong>For security.</strong> We use information about you to maintain and increase the security of the WhyLabs Products, including to detect, investigate, and prevent fraud and other illegal activities from occurring, as well as to protect the rights and property of WhyLabs, our customers, and third parties.</li><li class="text__list-item"><strong>To market and promote the WhyLabs Products.</strong> We use information about you to send you promotional messages and to show you advertisements. This may also include using information about you to create more personalized advertising and suggest WhyLabs Products that may be of interest to you. We may also use information about you to facilitate contests, sweepstakes, and promotions, and to process and deliver your entries and rewards.</li><li class="text__list-item"><strong>To comply with legal obligations.</strong> We may use information about you to comply with our legal requirements. For example, we may process and retain information about your payments to us for tax and accounting purposes.</li><li class="text__list-item"><strong>With your consent.</strong> Finally, we use information about you for any other purposes that you have consented to. For example, if you agree to be named as a Featured Customer, we might post information about you on one of our public websites.</li></ul><h3 id="personal-information" class="Title__CardTitle-sc-1kaq8ew-6 eDIPdU">3. How We Share Personal Information</h3><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">We may share your personal information as follows:</p><ul class="text__list"><li class="text__list-item"><strong>Service providers.</strong> We use third-party service providers who work on our behalf, including to provide hosting services, authentication services, cybersecurity and anti-fraud services, and advertising, which may require us to share your personal information.</li><li class="text__list-item"><strong>For legal reasons.</strong> In rare cases, we may share information about you in response to a request for information if we believe disclosure is permitted or required by an applicable law, regulation, or legal process, including to comply with a subpoena or applicable court order. Further, we may share your personal information with any person to whom disclosure is necessary to enable us to enforce our rights under this Privacy Policy or under any agreement we enter with you or to protect the rights, property, or safety of WhyLabs or third parties.</li><li class="text__list-item"><strong>Business transfers.</strong> We may share your information in connection with, or during negotiations of, any merger, sale of WhyLabs assets, financing, or acquisition of all or a portion of our business by another company.</li><li class="text__list-item"><strong>Affiliates.</strong> We may share your personal information with our affiliate companies who may act for us for any of the purposes set out in this Privacy Policy, including our current and future parents, affiliates, subsidiaries, and other companies under common control and ownership.</li><li class="text__list-item"><strong>Marketing and analytics.</strong> We may share your personal information with analytics and search-engine providers that assist us in the improvement and optimization of our websites, subject to our<!-- --> <a href="/web/20241212162225/https://whylabs.ai/cookie-policy" title="WhyLabs Cookie Policy" target="_self">Cookie Policy.</a></li><li class="text__list-item"><strong>Social Media.</strong> Some of our websites may contain social-sharing widgets or features that let you share information you find on our websites on third-party sites, including, for example, Twitter, LinkedIn, and YouTube. By doing so, you authorize us to facilitate this sharing of information, and you understand that the use of shared information will be governed by the social media provider&#x27;s privacy notice.</li><li class="text__list-item"><strong>Consent.</strong> We may share your personal information with your consent or at your direction.</li></ul><h3 id="security" class="Title__CardTitle-sc-1kaq8ew-6 eDIPdU">4. Security</h3><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">The security of your personal information is incredibly important to us. We have implemented and we continually maintain a variety of technical and organizational measures to protect your personal information from unauthorized access and against unlawful processing, accidental loss, destruction, and damage. View our Security page to learn more about the specific security controls we have put in place to safeguard your information.</p><h3 id="retention" class="Title__CardTitle-sc-1kaq8ew-6 eDIPdU">5. Retention</h3><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">We only keep your personal information for as long as necessary to fulfill the purposes we collected it for, after which it will be deleted or archived unless we are required to keep it to comply with our legal obligations or for another legitimate and lawful purpose. To determine the appropriate retention period for personal information, we consider several factors, including:<ul class="text__list"><li class="text__list-item">the terms of our agreements with you;</li><li class="text__list-item">our legitimate interests (as outlined in this Privacy Policy);</li><li class="text__list-item">our legal obligations; and</li><li class="text__list-item">the nature of your personal information.</li><li class="text__list-item">In some cases, we may anonymize your personal information so that you are no longer identifiable, in which case we may use the resulting information without further notice to you.</li></ul></p><div class="Box-dqx32e-0 mtjPu"><h3 id="children" class="Title__CardTitle-sc-1kaq8ew-6 eDIPdU">6. Children</h3><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">The WhyLabs Products are not directed to individuals under the age of 16, and we do not knowingly collect or sell the personal information of children under 16.</p></div><h3 id="your-choices" class="Title__CardTitle-sc-1kaq8ew-6 eDIPdU">7. Your Choices</h3><div class="Box-dqx32e-0 mtjPu"><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">You have choices about how WhyLabs collects and uses your personal information:</p></div><ul class="text__list"><li class="text__list-item"><strong>Account information.</strong> Our customers may access, update, or change personal information they have provided to us by logging into the relevant WhyLabs application or emailing us at <a href="/web/20241212162225/https://whylabs.ai/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="4d3e383d3d223f390d3a2534212c2f3e632c24">[email&#160;protected]</a>. Subject to the terms of their agreements with us, customers may deactivate their accounts by emailing us at <a href="/web/20241212162225/https://whylabs.ai/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="96e5e3e6e6f9e4e2d6e1feeffaf7f4e5b8f7ff">[email&#160;protected]</a>, but we may retain certain personal information as necessary to comply with our legal obligations or for legitimate business purposes, such as to resolve disputes or enforce our agreements. We may also retain cached or archived copies of personal information for a certain period.</li><li class="text__list-item"><strong>Advertising.</strong> You may opt out of receiving promotional emails from WhyLabs by following the instructions in those emails or by emailing <a href="/web/20241212162225/https://whylabs.ai/cdn-cgi/l/email-protection" class="__cf_email__" data-cfemail="24575154544b565064534c5d484546570a454d">[email&#160;protected]</a>. If you opt out of receiving promotional communications, we may still send you non-promotional emails, such as those about your account or our ongoing business relationship. If you would like to opt out of receiving promotional phone calls, please contact us as outlined in the “Contact Us” section below</li></ul><h3 id="supplemental-notice-eea-uk-ch" class="Title__CardTitle-sc-1kaq8ew-6 eDIPdU">8. Supplemental Notice for the EEA, UK, and Switzerland</h3><div class="Box-dqx32e-0 mtjPu"><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">This section provides additional details about the personal information we process subject to the General Data Protection Regulation (GDPR) and UK GDPR.</p></div><p class="Text__Paragraph-sc-10mwqho-0 Text__ParagraphMedium-sc-10mwqho-4 gRIvAp"><strong>Controller of Your Information</strong></p><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">Unless otherwise stated in a supplemental notice, WhyLabs, Inc. is the data controller of your personal information.</p><p class="Text__Paragraph-sc-10mwqho-0 Text__ParagraphMedium-sc-10mwqho-4 gRIvAp"><strong>Your Rights</strong></p><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">Subject to applicable law, you have the following rights with respect to your personal information.</p><ul class="text__list"><li class="text__list-item"><strong>Right to access.</strong> You have the right to access your personal information that we hold, and receive it in a portable way.</li><li class="text__list-item"><strong>Right to update.</strong> You have the right to request that we update your personal information.</li><li class="text__list-item"><strong>Right to delete.</strong> You have the right to have your personal information deleted.</li><li class="text__list-item"><strong>Right to restrict processing.</strong> You have the right to request us to restrict or suppress the processing of your personal information where our processing is inappropriate.</li><li class="text__list-item"><strong>Right to object.</strong> You have the right to object to the processing of your personal information.</li><li class="text__list-item"><strong>Right to withdraw consent.</strong> You have the right to withdraw your consent at any time where we are processing your personal information based on your prior consent.</li></ul><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">To exercise your rights, please contact us as outlined in the “Contact Us” section below. Please note that we may ask you to provide us with additional information to confirm your identity.</p><p class="Text__Paragraph-sc-10mwqho-0 Text__ParagraphMedium-sc-10mwqho-4 gRIvAp"><strong>Legal Bases for Processing Personal Information</strong></p><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">We process your personal information on one or more of the following legal bases:<ul class="text__list"><li class="text__list-item">where necessary to enter into or perform under a contract with you, including to provide the WhyLabs Products;</li><li class="text__list-item">where necessary for us to comply with a legal obligation;</li><li class="text__list-item">for our legitimate interests, as outlined in this Privacy Policy; or</li><li class="text__list-item">with your consent.</li></ul></p><p class="Text__Paragraph-sc-10mwqho-0 Text__ParagraphMedium-sc-10mwqho-4 gRIvAp"><strong>International Data Transfers</strong></p><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">Your personal information may be collected in, transferred to, accessed from, or stored in a country other than the one you are in, including the United States, which may have data protection rules that are different from those of your country. Your personal information is only transferred out of your country in accordance with applicable data protection law, including, for example, to third countries that adequately safeguard personal data, or under the European Commission-approved Standard Contractual Clauses. Your rights with respect to your personal information are outlined above in the “Your rights” section above.</p><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">We comply with the EU-U.S. Data Privacy Framework (EU-U.S. DPF), the UK Extension to the EU-U.S. DPF, and the Swiss-U.S. Data Privacy Framework (Swiss-U.S. DPF) as set forth by the U.S. Department of Commerce (together, the “DPF”), and we have certified to the U.S. Department of Commerce that we adhere to the EU-U.S. Data Privacy Framework Principles with regard to the processing of personal data received from the European Union in reliance on the EU-U.S. DPF and from the United Kingdom (and Gibraltar) in reliance on the UK Extension to the EU-U.S. DPF, and the Swiss-U.S. Data Privacy Framework Principles with regard to the processing of personal data received from Switzerland in reliance on the Swiss-U.S. DPF (together, the “DPF Principles”). A full list of all participating organizations is available on the U.S. Department of Commerce&#x27;s<!-- --> <a href="https://web.archive.org/web/20241212162225/https://www.dataprivacyframework.gov/s/participant-search" title="DPF website link" target="_blank">dedicated DPF website</a>.<p class="Text__Paragraph-sc-10mwqho-0 Text__ParagraphSmall-sc-10mwqho-5 fNtBRG">If you have any questions, concerns, or complaints about our compliance with the DPF, we encourage you to contact us as outlined in the “Contact Us” section below. If you have a complaint that we have violated the DPF Principles that has not been resolved by other means, you may have the ability to invoke binding arbitration as outlined more fully on the DPF website. Please note that we are subject to the investigatory and enforcement powers of the U.S. Federal Trade Commission (FTC).</p><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">In some cases, we may be required to disclose personal data in response to lawful requests by public authorities, including to meet national security or law enforcement requirements. More information about the safeguards we’ve implemented to protect transfers of personal data is available in our WhyLabs Transfer Impact Assessment.</p><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">If we transfer your personal data onward to a third party, we will continue to remain liable under the DPF Principles if the information is processed in a manner inconsistent with the DPF Principles.</p></p><p class="Text__Paragraph-sc-10mwqho-0 Text__ParagraphMedium-sc-10mwqho-4 gRIvAp"><strong>Complaints</strong></p><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">You may lodge a complaint with a data protection authority for your country or region where you have your habitual residence, where you work, or where an alleged infringement of applicable data protection law occurs. A list of EEA data protection authorities is available<!-- --> <a href="https://web.archive.org/web/20241212162225/https://ec.europa.eu/newsroom/article29/items/612080">here</a>, and the contact details for the UK Information Commissioner&#x27;s Office is available <a href="https://web.archive.org/web/20241212162225/https://ico.org.uk/global/contact-us/">here</a>.</p><div id="supplemental-notice-us" class="Box-dqx32e-0 mtjPu"><h3 class="Title__CardTitle-sc-1kaq8ew-6 eDIPdU">9. Supplemental Notice for the United States</h3></div><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">This section provides additional details about the personal information we collect about individuals and the rights afforded to them under various applicable U.S. state data-protection and privacy laws, including the California Consumer Privacy Act, as amended (CCPA), the Colorado Privacy Act (CPA), the Connecticut Data Privacy Act (CTDPA), the Utah Consumer Privacy Act (UCPA), and the Virginia Consumer Data Protection Act (VCDPA).</p><p class="Text__Paragraph-sc-10mwqho-0 Text__ParagraphMedium-sc-10mwqho-4 gRIvAp"><strong>Your Rights</strong></p><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">Subject to applicable law, you have the following rights with respect to your personal information.</p><ul class="text__list"><li class="text__list-item"><strong>Right to access.</strong> You have the right to request that we disclose to you in a portable format the personal information we collect, use, disclose, share, and sell about you.</li><li class="text__list-item"><strong>Right to correct.</strong> You have the right to correct errors in your personal information.</li><li class="text__list-item"><strong>Right to delete.</strong> You have the right to request that we delete your personal information that we&#x27;ve collected.</li><li class="text__list-item"><strong>Right to update.</strong> You have the right to request that inaccurate personal information we hold about you be corrected.</li><li class="text__list-item"><strong>Right to opt out.</strong> You have the right to opt out of behavioral or targeted advertising, automated profiling, and sales of personal information.</li><li class="text__list-item"><strong>Right to restrict the use and disclosure of your sensitive information.</strong> You have the right to request that we limit our use and disclosure of your sensitive personal information.</li><li class="text__list-item"><strong>Right to nondiscrimination.</strong> You have the right not to receive discriminatory treatment because you’ve exercised any of your rights under the CCPA.</li></ul><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">If you or your authorized agent wishes to exercise any of these rights, please contact us as outlined in the “Contact Us” section below. Please note that we may ask you or your agent to provide us with additional information to confirm your identity.</p><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">If you submit a request to exercise one of the above rights and you disagree with our decision regarding your request, you may have the right to appeal our decision under applicable law. To do so, please reply to our response.</p><p class="Text__Paragraph-sc-10mwqho-0 Text__ParagraphMedium-sc-10mwqho-4 gRIvAp"><strong>Categories of Personal Information Collected</strong></p><p class="PrivacyPolicyContent20231227__StyledContentText-sc-1rvpbn3-0 eEkdtt">The personal information that we&#x27;ve collected in the past 12 months fall into the following categories specifically established under the CCPA:<ul class="text__list"><li class="text__list-item">Identifiers such as a real name, postal address, unique personal identifier, online identifier, internet protocol address, and email address.</li><li class="text__list-item">Information under Cal. Civ. Code §1798.80(e), such as your name, address, telephone number, or any financial information.</li><li class="text__list-item">Commercial information, such as information related to products or services you&#x27;ve purchased.</li><li class="text__list-item">Internet or other electronic network activity information, such information regarding your interaction with the WhyLabs Products.</li><li class="text__list-item">Geolocation data.</li><li class="text__list-item">Audio, electronic, visual, or similar information, such as audio recordings of calls with you.</li><li class="text__list-item">Inferences drawn on the information above, such as aggregated metrics.</li><li class="text__list-item">Account log-in or credit card number in combination with your credentials allowing access to your account.</li></ul>For more information about the categories of personal information we collect, please see the “Personal Information We Collect” section above.</p><p class="Text__Paragraph-sc-10mwqho-0 Text__ParagraphMedium-sc-10mwqho-4 gRIvAp"><strong>Categories of Personal Information Disclosed for a Business Purpose</strong></p><p class="Text__Paragraph-sc-10mwqho-0 Text__ParagraphSmall-sc-10mwqho-5 fjKhPO">The personal information that we&#x27;ve disclosed for a business purpose (including to our service providers) in the past 12 months fall into the following categories specifically established under the CCPA:<ul class="text__list"><li class="text__list-item">Identifiers such as a real name, postal address, unique personal identifier, online identifier, internet protocol address, and email address.</li><li class="text__list-item">Information under Cal. Civ. Code §1798.80(e), such as your name, address, telephone number, or any financial information.</li><li class="text__list-item">Commercial information, such as information related to products or services you&#x27;ve purchased.</li><li class="text__list-item">Internet or other electronic network activity information, such information regarding your interaction with the WhyLabs Products.</li><li class="text__list-item">Geolocation data.</li><li class="text__list-item">Audio, electronic, visual, or similar information, such as audio recordings of calls with you.</li><li class="text__list-item">Inferences drawn on the information above, such as aggregated metrics.</li><li class="text__list-item">Account log-in or credit card number in combination with your credentials allowing access to your account.</li></ul>For more information about the categories of personal information we disclose to other parties, including to our service providers, please see the “How We Share Personal Information” section above.</p><p class="Text__Paragraph-sc-10mwqho-0 Text__ParagraphMedium-sc-10mwqho-4 gRIvAp"><strong>No Sale or Sharing of Personal Information</strong></p><p class="Text__Paragraph-sc-10mwqho-0 Text__ParagraphSmall-sc-10mwqho-5 fjKhPO">We do not sell or share (for the purpose of cross-context behavioral advertising) your personal information, as those terms are defined under the CCPA.</p><h3 id="policy-changes" class="Title__CardTitle-sc-1kaq8ew-6 eDIPdU">10. Changes to this Privacy Policy</h3><div class="Box-dqx32e-0 mtjPu"><p class="Text__Paragraph-sc-10mwqho-0 Text__ParagraphSmall-sc-10mwqho-5 fjKhPO">We may occasionally update this Privacy Policy. The date at the top of this Privacy Policy indicates when it was last revised. Any changes will become effective when we post the revised Privacy Policy on this page.</p></div><h3 id="contact-us" class="Title__CardTitle-sc-1kaq8ew-6 eDIPdU">11. Contact Us</h3><div class="Box-dqx32e-0 mtjPu"><p class="Text__Paragraph-sc-10mwqho-0 Text__ParagraphSmall-sc-10mwqho-5 fjKhPO">If you have questions or concerns about this Privacy Policy, please contact us at: WhyLabs, Inc., 999 3rd Ave, Seattle, WA 98104; or at <a href="/web/20241212162225/https://whylabs.ai/cdn-cgi/l/email-protection#0370666076716a777a43746b7a6f6261702d626a"><span class="__cf_email__" data-cfemail="205345435552495459605748594c4142530e4149">[email&#160;protected]</span>.</a></p></div></div></div></div></div></div></main><footer><div class="Box-dqx32e-0 mtjPu footer-2"><div class="container"><div class="Box-dqx32e-0 mtjPu"><div class="row"><div class="pb-4 pb-lg-3 pb-xl-5 d-flex justify-content-center col-12"><a class="footer-logo d-flex justify-content-center" title="WhyLabs Home Link" href="/web/20241212162225/https://whylabs.ai/"><span style="box-sizing:border-box;display:inline-block;over
